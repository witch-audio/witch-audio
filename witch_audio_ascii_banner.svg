    <radialGradient id="glow3" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(640 560) rotate(0) scale(420 180)">
      <stop stop-color="#FF5CF0" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#FF5CF0" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
