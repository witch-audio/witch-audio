<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#05070D"/>
      <stop offset="1" stop-color="#0B1020"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(290 180) rotate(18) scale(280 220)">
      <stop stop-color="#8A5CFF" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#8A5CFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(890 210) rotate(-20) scale(360 240)">
      <stop stop-color="#00E5FF" stop-opacity="0.34"/>
