    </filter>
  </defs>

  <rect width="1200" height="720" rx="24" fill="url(#bg)"/>
  <rect x="18" y="18" width="1164" height="684" rx="18" stroke="#1E263D"/>
  <ellipse cx="290" cy="180" rx="280" ry="220" fill="url(#glow1)" filter="url(#soft)"/>
